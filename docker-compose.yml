services:
  client:
    build:
      context: .
      target: frontend-service
      args:
        NEXT_PUBLIC_API_BASE_URL: http://server:8000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./client:/client
      - /client/node_modules
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
      - NEXT_PUBLIC_SSR_API_BASE_URL=http://server:8000
      - SHARE_URL=${SHARE_URL}
    command: ["pnpm", "run", "dev"]
    depends_on:
      - server

  server:
    build:
      context: .
      target: backend-service
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./server:/server
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URI=mongodb://mongodb:27017/quizApp_db
      - PYTHONPATH=/
    command: ["uvicorn", "server.main:app", "--host", "0.0.0.0", "--port", "${BACKEND_PORT:-8000}", "--reload"]
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: .
      target: backend-service
    volumes:
      - ./server:/server
    environment:
      - SENDER_EMAIL=${SENDER_EMAIL}
      - SENDER_PASSWORD=${SENDER_PASSWORD}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - SHARE_URL=${SHARE_URL}
      - MONGO_URI=mongodb://mongodb:27017/quizApp_db
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/
    command: ["celery", "-A", "server.celery_config.celery_app", "worker",
              "-Q", "email,celery",
              "--loglevel=info", "--pool=solo", "--concurrency=1"]
    depends_on:
      redis:
        condition: service_healthy
      server:
        condition: service_started

  mongodb:
    image: mongo:latest
    ports:
      - "${MONGO_PORT:-27017}:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mongo_data:/data/db

  seed:
    build:
      context: .
      target: backend-service
    volumes:
      - ./server:/server
    environment:
      - MONGO_URI=mongodb://mongodb:27017/quizApp_db
      - FERNET_KEY=${FERNET_KEY}
      - PYTHONPATH=/
    command: ["python", "-m", "server.app.seed"]
    depends_on:
      mongodb:
        condition: service_healthy

  redis:
    image: redis:7
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
