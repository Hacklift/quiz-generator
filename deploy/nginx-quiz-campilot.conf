# Quiz Generator — quiz.campilot.org (frontend) + quiz-api.campilot.org (API)
# Install to /etc/nginx/sites-available/quiz-campilot and symlink into sites-enabled.
# TLS uses the shared Cloudflare Origin certificate for *.campilot.org.

# Upgrade WebSocket connections only when the client asks for it.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      "";
}

# Frontend — quiz.campilot.org
server {
    listen 80;
    server_name quiz.campilot.org;
    return 301 https://quiz.campilot.org$request_uri;
}

server {
    listen 443 ssl;
    server_name quiz.campilot.org;

    ssl_certificate     /etc/nginx/ssl/campilot/campilot.org.crt;
    ssl_certificate_key /etc/nginx/ssl/campilot/campilot.org.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:3020;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# API — quiz-api.campilot.org
server {
    listen 80;
    server_name quiz-api.campilot.org;
    return 301 https://quiz-api.campilot.org$request_uri;
}

server {
    listen 443 ssl;
    server_name quiz-api.campilot.org;

    ssl_certificate     /etc/nginx/ssl/campilot/campilot.org.crt;
    ssl_certificate_key /etc/nginx/ssl/campilot/campilot.org.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Document uploads default to a 10 MB limit in the app.
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8020;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # AI quiz generation can be slow; live-quiz uses WebSockets.
        proxy_read_timeout 300s;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
